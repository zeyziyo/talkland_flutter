name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # Enable Gradle caching

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable' # Use latest stable version
        cache: true       # Enable Flutter pub cache
        
    - name: Clean and Get dependencies
      run: |
        flutter clean
        flutter pub get

    - name: Fix potential plugin path issues (app_links etc.)
      run: |
        # Workaround for AGP 8.3+ and certain plugins missing release source directories
        # This prevents 'checkReleaseAarMetadata' and 'compileReleaseKotlin' failures
        PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
        TARGET_DIR="$PUB_CACHE_DIR/hosted/pub.dev/app_links-6.4.1/android/src/release/java"
        mkdir -p "$TARGET_DIR"
        touch "$TARGET_DIR/.keep"
        echo ">>> Ensured plugin source directory exists at: $TARGET_DIR"

    - name: Pre-download sqlite3 native assets (jniLibs Injection)
      run: |
        VERSION="3.1.2"
        BASE_URL="https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-$VERSION"
        JNI_BASE="android/app/src/main/jniLibs"
        
        echo ">>> Injecting sqlite3 $VERSION native assets to $JNI_BASE"
        
        download_asset() {
          local src_arch=$1
          local target_dir=$2
          local src_file="libsqlite3.${src_arch}.android.so"
          local target_file="$JNI_BASE/${target_dir}/libsqlite3.so"
          
          mkdir -p "$JNI_BASE/$target_dir"
          echo ">>> Downloading $src_file for $target_dir..."
          # Use verbose curl for better diagnostics, retrying on connection issues
          if ! curl --fail --location --show-error --connect-timeout 60 --retry 15 --retry-delay 5 --retry-connrefused \
            -o "$target_file" "$BASE_URL/$src_file"; then
            echo "Error: Failed to download $src_file from $BASE_URL/$src_file. Build aborted."
            exit 1
          fi
        }
        
        # Exact mapping for sqlite3-3.1.2 release assets
        download_asset "arm" "armeabi-v7a"
        download_asset "arm64" "arm64-v8a"
        download_asset "ia32" "x86"
        download_asset "x64" "x86_64"
        
        echo ">>> Verifying injected assets in $JNI_BASE:"
        find "$JNI_BASE" -name "libsqlite3.so" -ls
        count=$(find "$JNI_BASE" -name "libsqlite3.so" | wc -l)
        if [ "$count" -lt 4 ]; then
          echo "Error: Only found $count of 4 required JNI assets! Build aborted."
          exit 1
        fi
        echo ">>> All 4 sqlite3 JNI assets successfully injected and verified."

    - name: Generate Localizations
      run: flutter gen-l10n

    - name: Create key.properties
      run: |
        echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/key.properties
        
    - name: Decode Keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
    - name: Create .env file
      run: |
        echo "GOOGLE_CLOUD_API_KEY=${{ secrets.GOOGLE_CLOUD_API_KEY }}" > .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
        echo "GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}" >> .env
        echo "KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}" >> .env
        echo "KAKAO_JAVASCRIPT_KEY=${{ secrets.KAKAO_JAVASCRIPT_KEY }}" >> .env

    - name: Build APK (Release)
      env:
        FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}
      run: flutter build apk --release --verbose
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: talkie-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7

    - name: Build App Bundle (AAB)
      run: flutter build appbundle --release --verbose
      
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: talkie-release-aab
        path: build/app/outputs/bundle/release/app-release.aab
        retention-days: 7

