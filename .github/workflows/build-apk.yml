name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # Enable Gradle caching

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable' # Use latest stable version
        cache: true       # Enable Flutter pub cache
        
    - name: Clean and Get dependencies
      run: |
        flutter clean
        flutter pub get

    - name: Pre-download sqlite3 native assets (jniLibs Injection)
      run: |
        VERSION="3.1.2"
        BASE_URL="https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-$VERSION"
        JNI_BASE="android/app/src/main/jniLibs"
        
        # 아키텍처 맵핑 정의 (Source -> Android JNI Dir)
        declare -A ARCH_MAP=(
          ["arm"]="armeabi-v7a"
          ["arm64"]="arm64-v8a"
          ["ia32"]="x86"
          ["x64"]="x86_64"
        )
        
        echo ">>> Injecting sqlite3 $VERSION native assets to $JNI_BASE"
        for arch in "${!ARCH_MAP[@]}"; do
          DIR="${ARCH_MAP[$arch]}"
          FILE="libsqlite3.$arch.android.so"
          TARGET_FILE="$JNI_BASE/$DIR/libsqlite3.so"
          
          mkdir -p "$JNI_BASE/$DIR"
          echo ">>> Processing $FILE for $DIR..."
          
          if ! curl --fail --location --show-error --connect-timeout 60 --retry 10 --retry-delay 5 --retry-connrefused \
            -o "$TARGET_FILE" "$BASE_URL/$FILE"; then
            echo "Error: Failed to download $FILE. Build aborted."
            exit 1
          fi
        done
        
        echo ">>> Verifying injected assets in $JNI_BASE:"
        find "$JNI_BASE" -name "libsqlite3.so" -ls
        count=$(find "$JNI_BASE" -name "libsqlite3.so" | wc -l)
        if [ "$count" -lt 4 ]; then
          echo "Error: Found only $count of 4 jniLibs assets! Build aborted."
          exit 1
        fi
        echo ">>> All 4 sqlite3 JNI assets successfully injected."

    - name: Generate Localizations
      run: flutter gen-l10n

    - name: Create key.properties
      run: |
        echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/key.properties
        
    - name: Decode Keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
    - name: Create .env file
      run: |
        echo "GOOGLE_CLOUD_API_KEY=${{ secrets.GOOGLE_CLOUD_API_KEY }}" > .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
        echo "GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}" >> .env
        echo "KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}" >> .env
        echo "KAKAO_JAVASCRIPT_KEY=${{ secrets.KAKAO_JAVASCRIPT_KEY }}" >> .env

    - name: Build APK (Release)
      env:
        FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}
      run: flutter build apk --release --verbose
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: talkie-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7

    - name: Build App Bundle (AAB)
      run: flutter build appbundle --release --verbose
      
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: talkie-release-aab
        path: build/app/outputs/bundle/release/app-release.aab
        retention-days: 7

