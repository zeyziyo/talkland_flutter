name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # Enable Gradle caching

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable' # Use latest stable version
        cache: true       # Enable Flutter pub cache
        
    - name: Get dependencies
      run: flutter pub get

    - name: Pre-download sqlite3 native assets
      run: |
        # Use Version 3.45.3 as a potential stable alternative if 3.1.2 is problematic, 
        # but let's keep 3.1.2 and improve robustness first.
        VERSION="3.1.2"
        BASE_URL="https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-$VERSION"
        PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
        # Use a more explicit target directory if needed
        TARGET_DIR="$PUB_CACHE_DIR/hosted/pub.dev/sqlite3-$VERSION"
        mkdir -p "$TARGET_DIR"
        
        echo ">>> Downloading sqlite3 $VERSION native assets to $TARGET_DIR"
        for arch in arm arm64 x64 ia32; do
          FILE="libsqlite3.$arch.android.so"
          echo ">>> Fetching $FILE..."
          curl --fail --location --show-error --connect-timeout 60 --retry 15 --retry-delay 10 --retry-connrefused \
            -o "$TARGET_DIR/$FILE" "$BASE_URL/$FILE" || echo "Warning: Failed to download $FILE"
        done
        
        echo ">>> Verifying assets in $TARGET_DIR:"
        ls -lh "$TARGET_DIR"
        count=$(ls -1 "$TARGET_DIR"/*.so 2>/dev/null | wc -l)
        if [ "$count" -lt 4 ]; then
          echo "Error: Only found $count of 4 sqlite3 native assets! Build cannot proceed."
          exit 1
        fi
        echo ">>> All 4 sqlite3 native assets verified."

    - name: Generate Localizations
      run: flutter gen-l10n

    - name: Create key.properties
      run: |
        echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/key.properties
        
    - name: Decode Keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
    - name: Create .env file
      run: |
        echo "GOOGLE_CLOUD_API_KEY=${{ secrets.GOOGLE_CLOUD_API_KEY }}" > .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
        echo "GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}" >> .env
        echo "KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}" >> .env
        echo "KAKAO_JAVASCRIPT_KEY=${{ secrets.KAKAO_JAVASCRIPT_KEY }}" >> .env

    - name: Build APK
      env:
        FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}
      run: flutter build apk --release --verbose
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: talkie-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7

    - name: Build App Bundle (AAB)
      run: flutter build appbundle --release --verbose
      
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: talkie-release-aab
        path: build/app/outputs/bundle/release/app-release.aab
        retention-days: 7

